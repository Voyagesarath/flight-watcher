name: ✈️ Flight Price Tracker

on:
  # Scheduled runs are handled LOCALLY by the macOS LaunchAgent
  # (com.flightwatcher.check) so we don't rely on GitHub. The cron block below
  # is intentionally disabled — re-enable it if you ever want GitHub to run too
  # (note: running both sends duplicate Telegram messages).
  #
  # schedule:
  #   - cron: "30 2  * * *"   # 08:00 IST
  #   - cron: "30 8  * * *"   # 14:00 IST
  #   - cron: "30 14 * * *"   # 20:00 IST
  #   - cron: "30 20 * * *"   # 02:00 IST

  workflow_dispatch:   # manual trigger from GitHub UI anytime

# Never let two runs scan + commit state.json at the same time.
concurrency:
  group: flight-check
  cancel-in-progress: false

jobs:
  check-flights:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # needed to commit state.json

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      # Fail fast on broken logic so a bad deploy can never send garbage prices.
      - name: Run tests
        run: python test_checker.py

      - name: Run flight checker
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python checker.py

      - name: Commit price state
        run: |
          git config user.name  "flight-bot"
          git config user.email "flight-bot@users.noreply.github.com"
          git add state.json
          git diff --staged --quiet && exit 0
          git commit -m "chore: update price state [skip ci]"
          # Rebase onto any state pushed by an earlier run, then push (retry once).
          git pull --rebase --autostash origin "${GITHUB_REF_NAME}" || true
          git push || (git pull --rebase --autostash origin "${GITHUB_REF_NAME}" && git push)
