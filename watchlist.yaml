  price_threshold_inr: 999999
  top_results: 10
  seat: economy
  adults: 1

  max_stops: null
  fetch_mode: fallback
  retries: 3
  # Splits the 75-destination list across 8 hourly runs (11am-6pm IST, Mon-Fri).
  # Each run scans ~9-10 destinations. The 6pm run combines all 8 and sends
  # the daily Telegram report. Weekends run via GitHub Actions at 2pm IST.
  shards: 8
  concurrency: 1
  request_delay_sec: 0.5

